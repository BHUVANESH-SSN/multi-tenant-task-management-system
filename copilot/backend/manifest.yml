# The manifest for the "backend" service.
# Read the full specification for the "Load Balanced Web Service" type at:
#  https://aws.github.io/copilot-cli/docs/manifest/lb-web-service/

# Your service name will be used in naming your resources like log groups, ECS services, etc.
name: backend
type: Load Balanced Web Service

# Distribute traffic to your service.
http:
  # Requests to this path will be forwarded to your service.
  # To match all requests you can use the "/" path.
  path: '/api'
  # You can specify a custom health check path. The default is "/".
  healthcheck: '/api/health'

# Configuration for your containers and service.
image:
  # Docker build arguments. For additional overrides: https://aws.github.io/copilot-cli/docs/manifest/lb-web-service/#image-build
  build: backend/Dockerfile
  # Port exposed through your container to route traffic to it.
  port: 3000

cpu: 256       # Number of CPU units for the task.
memory: 512    # Amount of memory in MiB used by the task.
count: 1       # Number of tasks that should be running in your service.
exec: true     # Enable running commands in your container.
network:
  connect: true # Enable Service Connect for intra-environment traffic between services.

# storage:
  # readonly_fs: true       # Limit to read-only access to mounted root filesystems.

# Optional fields for more advanced use-cases.
#
variables:                    # Pass environment variables as key value pairs.
  NODE_ENV: production

#secrets:                      # Pass secrets from AWS Systems Manager (SSM) Parameter Store.
#  GITHUB_TOKEN: GITHUB_TOKEN  # The key is the name of the environment variable, the value is the name of the SSM parameter.

environments:
  production:
    secrets:
      DATABASE_URL: /copilot/multi-tenant-system/production/secrets/DATABASE_URL
      JWT_SECRET: /copilot/multi-tenant-system/production/secrets/JWT_SECRET
      JWT_REFRESH_SECRET: /copilot/multi-tenant-system/production/secrets/JWT_REFRESH_SECRET
    variables:
      FRONTEND_URL: http://multi--Publi-e504O3QGe6Tk-1687279241.eu-north-1.elb.amazonaws.com

  production-rds:
    http:
      alias: taskflowapp.me
    secrets:
      DATABASE_URL: /copilot/multi-tenant-system/production-rds/secrets/DATABASE_URL
      JWT_SECRET: /copilot/multi-tenant-system/production-rds/secrets/JWT_SECRET
      JWT_REFRESH_SECRET: /copilot/multi-tenant-system/production-rds/secrets/JWT_REFRESH_SECRET
      GOOGLE_CLIENT_ID: /copilot/multi-tenant-system/production-rds/secrets/GOOGLE_CLIENT_ID
      GOOGLE_CLIENT_SECRET: /copilot/multi-tenant-system/production-rds/secrets/GOOGLE_CLIENT_SECRET
      GITHUB_CLIENT_ID: /copilot/multi-tenant-system/production-rds/secrets/GITHUB_CLIENT_ID
      GITHUB_CLIENT_SECRET: /copilot/multi-tenant-system/production-rds/secrets/GITHUB_CLIENT_SECRET
    variables:
      FRONTEND_URL: https://taskflowapp.me
      GOOGLE_CALLBACK_URL: https://taskflowapp.me/api/auth/google/callback
      GITHUB_CALLBACK_URL: https://taskflowapp.me/api/auth/github/callback
